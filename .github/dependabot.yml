version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      next:
        patterns:
          - "next"
          - "@next/*"
      radix:
        patterns:
          - "@radix-ui/*"
      remark:
        patterns:
          - "remark-*"
      rehype:
        patterns:
          - "rehype-*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwind-merge"
          - "tailwindcss-animate"
      minor-and-patch:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - "react"
          - "react-dom"
          - "next"
          - "@next/*"
          - "@radix-ui/*"
          - "remark-*"
          - "rehype-*"
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns:
          - "*"
