name: Optimize Photos

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Processing mode"
        required: false
        default: "default"
        type: choice
        options:
          - default
          - force
          - clean
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours

concurrency:
  group: optimize-photos
  cancel-in-progress: false

jobs:
  optimize:
    name: Optimize & Upload Photos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run optimization
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          MODE="${{ inputs.mode || 'default' }}"
          if [ "$MODE" = "clean" ]; then
            bun run scripts/optimize-photos.ts --clean
          elif [ "$MODE" = "force" ]; then
            bun run scripts/optimize-photos.ts --force
          else
            bun run scripts/optimize-photos.ts
          fi

      - name: Purge Cloudflare Cache
        if: success()
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"prefixes":["photos.adriandlam.com/"]}')
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body"
          if [ "$http_code" -ne 200 ]; then
            echo "::warning::Cloudflare cache purge failed with status $http_code"
          fi

      - name: Purge Vercel Cache
        if: success()
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.vercel.com/v1/edge-cache/invalidate-by-tags?projectIdOrName=prj_uBtescZoTJW4IjtvViy98hZAlX9f&teamId=team_V0Fs9lcvqbRHIlFCuxTAKjgT" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"tags":["photos"]}')
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body"
          if [ "$http_code" -ne 200 ]; then
            echo "::warning::Vercel cache purge failed with status $http_code"
          fi
